<!DOCTYPE html>
<html>
<head>
    <title>ImportHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="/">ImportHub</a>

<div>

<a class="btn btn-outline-light" href="/">Home</a>

<a class="btn btn-outline-light" href="/about/">About</a>

<a class="btn btn-outline-light" href="/pages/">Productos</a>

<a class="btn btn-outline-light"
   href="/buscar/">

Buscar

</a>

{% if user.is_authenticated %}

<a class="btn btn-outline-light" href="/cuentas/profile/">Perfil</a>

<a class="btn btn-outline-light" href="/mensajes/">Mensajes</a>

<form action="/cuentas/logout/" method="POST" style="display:inline;">

    {% csrf_token %}

    <button class="btn btn-danger">
        Logout
    </button>

</form>

{% else %}

<a class="btn btn-success" href="/cuentas/login/">Login</a>

<a class="btn btn-primary" href="/cuentas/signup/">Registro</a>

{% endif %}

<a class="btn btn-outline-light"
   href="/carrito/">

Carrito

</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block contenido %}

{% endblock %}

</div>

</body>
</html>
